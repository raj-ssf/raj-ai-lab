apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: keycloak-credentials
  namespace: auth
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: keycloak-credentials
  data:
    - secretKey: admin_password
      remoteRef:
        key: secret/data/keycloak
        property: admin_password
    - secretKey: user_password
      remoteRef:
        key: secret/data/keycloak
        property: user_password
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: oauth2-proxy-secrets
  namespace: auth
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: oauth2-proxy-secrets
  data:
    - secretKey: client-secret
      remoteRef:
        key: secret/data/oauth2-proxy
        property: client_secret
    - secretKey: cookie-secret
      remoteRef:
        key: secret/data/oauth2-proxy
        property: cookie_secret
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: keycloak-client-secrets
  namespace: auth
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: keycloak-client-secrets
  data:
    - secretKey: oauth2_proxy_secret
      remoteRef:
        key: secret/data/keycloak-clients
        property: oauth2_proxy_secret
    - secretKey: minio_secret
      remoteRef:
        key: secret/data/keycloak-clients
        property: minio_secret
    - secretKey: grafana_secret
      remoteRef:
        key: secret/data/keycloak-clients
        property: grafana_secret
    - secretKey: argocd_secret
      remoteRef:
        key: secret/data/keycloak-clients
        property: minio_secret
