apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: postgresql-credentials
  namespace: ai-platform
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: postgresql-credentials
  data:
    - secretKey: username
      remoteRef:
        key: secret/data/postgresql
        property: username
    - secretKey: password
      remoteRef:
        key: secret/data/postgresql
        property: password
    - secretKey: database
      remoteRef:
        key: secret/data/postgresql
        property: database
    - secretKey: host
      remoteRef:
        key: secret/data/postgresql
        property: host
    - secretKey: port
      remoteRef:
        key: secret/data/postgresql
        property: port
---
