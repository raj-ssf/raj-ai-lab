# vault-token Secret must be created manually (or from vault-bootstrap-secrets):
#   kubectl create secret generic vault-token -n vault --from-literal=token="$(kubectl get secret vault-bootstrap-secrets -n vault -o jsonpath='{.data.VAULT_TOKEN}' | base64 -d)"
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: vault-backend
spec:
  provider:
    vault:
      server: "http://vault.vault:8200"
      path: "secret"
      version: "v2"
      auth:
        tokenSecretRef:
          name: "vault-token"
          namespace: "vault"
          key: "token"
