apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: postgresql-credentials
  namespace: ai-data
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: postgresql-credentials
  data:
    - secretKey: username
      remoteRef:
        key: secret/data/postgresql
        property: username
    - secretKey: password
      remoteRef:
        key: secret/data/postgresql
        property: password
    - secretKey: database
      remoteRef:
        key: secret/data/postgresql
        property: database
    - secretKey: host
      remoteRef:
        key: secret/data/postgresql
        property: host
    - secretKey: port
      remoteRef:
        key: secret/data/postgresql
        property: port
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: minio-credentials
  namespace: ai-data
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: minio-credentials
  data:
    - secretKey: access_key
      remoteRef:
        key: secret/data/minio
        property: access_key
    - secretKey: secret_key
      remoteRef:
        key: secret/data/minio
        property: secret_key
    - secretKey: endpoint
      remoteRef:
        key: secret/data/minio
        property: endpoint
    - secretKey: oidc_client_secret
      remoteRef:
        key: secret/data/keycloak-clients
        property: minio_secret
