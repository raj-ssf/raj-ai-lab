apiVersion: batch/v1
kind: Job
metadata:
  name: vault-init
  namespace: vault
spec:
  backoffLimit: 5
  template:
    spec:
      restartPolicy: OnFailure
      serviceAccountName: default
      containers:
        - name: vault-init
          image: python:3.12-slim@sha256:c0f9f8769445b9117692977abd450e79a6313139c8bedbb61c500b687f7b5ddf
          envFrom:
            - secretRef:
                name: vault-bootstrap-secrets
          command:
            - /bin/bash
            - -c
            - |
              pip install --quiet hvac requests
              python3 << 'PYEOF'
              import hvac
              import time
              import os

              VAULT_ADDR = "http://vault.vault:8200"
              VAULT_TOKEN = os.environ["VAULT_TOKEN"]

              # Wait for Vault to be ready
              client = hvac.Client(url=VAULT_ADDR, token=VAULT_TOKEN)
              for i in range(30):
                  try:
                      if client.is_authenticated():
                          break
                  except Exception:
                      pass
                  time.sleep(2)
              else:
                  raise Exception("Vault not ready after 60s")

              print("Vault is ready and authenticated")

              # Enable KV v2 secrets engine at 'secret' path
              try:
                  client.sys.enable_secrets_engine(
                      backend_type="kv",
                      path="secret",
                      options={"version": "2"},
                  )
                  print("Enabled KV v2 at secret/")
              except hvac.exceptions.InvalidRequest as e:
                  if "already in use" in str(e):
                      print("KV v2 already enabled at secret/")
                  else:
                      raise

              # All values come from vault-bootstrap-secrets (never hardcoded in git)
              pg_pw = os.environ["PG_PASSWORD"]
              neo4j_pw = os.environ["NEO4J_PASSWORD"]

              secrets = {
                  "postgresql": {
                      "username": "ai_app",
                      "password": pg_pw,
                      "database": "ai_metadata",
                      "host": "postgresql.ai-data",
                      "port": "5432",
                      "connection_string": f"postgresql://ai_app:{pg_pw}@postgresql.ai-data:5432/ai_metadata",
                  },
                  "neo4j": {
                      "username": "neo4j",
                      "password": neo4j_pw,
                      "auth": f"neo4j/{neo4j_pw}",
                      "uri": "bolt://graphdb.ai-data:7687",
                  },
                  "minio": {
                      "access_key": os.environ["MINIO_ACCESS_KEY"],
                      "secret_key": os.environ["MINIO_SECRET_KEY"],
                      "endpoint": "minio.ai-data:9000",
                  },
                  "langfuse": {
                      "public_key": "pk-lf-ca45825c-e015-4c7c-b8bc-ed14572ec860",
                      "secret_key": "sk-lf-053f2654-f967-4c5d-9612-0405a54c41af",
                      "host": "http://langfuse.ai-platform:3001",
                  },
                  "langfuse-app": {
                      "database_url": f"postgresql://ai_app:{pg_pw}@postgresql.ai-data:5432/ai_metadata",
                      "nextauth_secret": os.environ["LANGFUSE_NEXTAUTH_SECRET"],
                      "salt": os.environ["LANGFUSE_SALT"],
                      "user_password": os.environ["LANGFUSE_USER_PASSWORD"],
                  },
                  "grafana": {
                      "admin_password": os.environ["GRAFANA_ADMIN_PASSWORD"],
                  },
                  "ollama": {
                      "url": "http://host.k3d.internal:11434",
                  },
                  "redis": {
                      "url": f"redis://:{os.environ['REDIS_PASSWORD']}@redis.ai-data:6379",
                      "password": os.environ["REDIS_PASSWORD"],
                  },
                  "qdrant": {
                      "api_key": os.environ.get("QDRANT_API_KEY", "qdrant-zzwmfgVdrf2BzAoPv8ZylA6ABwEYHsNp"),
                  },
                  "keycloak": {
                      "admin_password": os.environ["KEYCLOAK_ADMIN_PASSWORD"],
                      "user_password": os.environ["KEYCLOAK_USER_PASSWORD"],
                  },
                  "oauth2-proxy": {
                      "client_secret": os.environ["OAUTH2_PROXY_CLIENT_SECRET"],
                      "cookie_secret": os.environ["OAUTH2_PROXY_COOKIE_SECRET"],
                  },
                  "keycloak-clients": {
                      "oauth2_proxy_secret": os.environ["OAUTH2_PROXY_CLIENT_SECRET"],
                      "minio_secret": os.environ["MINIO_OIDC_CLIENT_SECRET"],
                      "grafana_secret": os.environ.get("GRAFANA_CLIENT_SECRET", "raj-ai-lab-grafana-secret"),
                      "argocd_secret": os.environ.get("ARGOCD_CLIENT_SECRET", "raj-ai-lab-argocd-secret"),
                      "neo4j_secret": os.environ.get("NEO4J_CLIENT_SECRET", "raj-ai-lab-neo4j-secret"),
                  },
              }

              for name, data in secrets.items():
                  client.secrets.kv.v2.create_or_update_secret(
                      path=name,
                      secret=data,
                      mount_point="secret",
                  )
                  print(f"Written secret: secret/data/{name}")

              # --- Kubernetes Auth Method ---
              print("Configuring Kubernetes auth method...")

              try:
                  client.sys.enable_auth_method(
                      method_type="kubernetes",
                      path="kubernetes",
                  )
                  print("Enabled kubernetes auth method")
              except hvac.exceptions.InvalidRequest as e:
                  if "already in use" in str(e):
                      print("Kubernetes auth already enabled")
                  else:
                      raise

              with open("/var/run/secrets/kubernetes.io/serviceaccount/ca.crt", "r") as f:
                  ca_cert = f.read()
              with open("/var/run/secrets/kubernetes.io/serviceaccount/token", "r") as f:
                  jwt_token = f.read()

              client.auth.kubernetes.configure(
                  kubernetes_host="https://kubernetes.default.svc",
                  pem_keys=[],
                  kubernetes_ca_cert=ca_cert,
                  token_reviewer_jwt=jwt_token,
              )
              print("Kubernetes auth configured")

              policy = """
              path "secret/data/*" {
                capabilities = ["read"]
              }
              """
              client.sys.create_or_update_policy(
                  name="ai-platform-read",
                  policy=policy,
              )
              print("Policy ai-platform-read created")

              client.auth.kubernetes.create_role(
                  name="ai-platform",
                  bound_service_account_names=["*"],
                  bound_service_account_namespaces=["ai-platform", "ai-data", "auth"],
                  policies=["ai-platform-read"],
                  ttl="1h",
              )
              print("Role ai-platform created")

              print("Vault initialization complete!")
              PYEOF
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      securityContext:
        seccompProfile:
          type: RuntimeDefault
