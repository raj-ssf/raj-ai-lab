apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: neo4j
  namespace: ai-data
spec:
  serviceName: graphdb-headless
  replicas: 1
  selector:
    matchLabels:
      app: neo4j
  template:
    metadata:
      labels:
        app: neo4j
    spec:
      containers:
        - name: neo4j
          image: neo4j:5.26-community@sha256:a5163941dd4bbf2a2232586fbc68c428d987fffa988f26ce2aa71c69b928ae36
          ports:
            - containerPort: 7474
              name: http
            - containerPort: 7687
              name: bolt
          env:
            - name: NEO4J_AUTH
              valueFrom:
                secretKeyRef:
                  name: neo4j-credentials
                  key: auth
            - name: NEO4J_PLUGINS
              value: '["apoc"]'
            - name: NEO4J_server_default__listen__address
              value: "0.0.0.0"
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /
              port: 7474
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 7474
            initialDelaySeconds: 60
            periodSeconds: 30
          volumeMounts:
            - name: neo4j-data
              mountPath: /data
  volumeClaimTemplates:
    - metadata:
        name: neo4j-data
      spec:
        accessModes: [ReadWriteOnce]
        resources:
          requests:
            storage: 2Gi
---
apiVersion: v1
kind: Service
metadata:
  name: graphdb
  namespace: ai-data
spec:
  selector:
    app: neo4j
  ports:
    - name: http
      port: 7474
    - name: bolt
      port: 7687
---
apiVersion: v1
kind: Service
metadata:
  name: graphdb-headless
  namespace: ai-data
spec:
  clusterIP: None
  selector:
    app: neo4j
  ports:
    - name: http
      port: 7474
    - name: bolt
      port: 7687
