apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgresql
  namespace: ai-data
spec:
  serviceName: postgresql-headless
  replicas: 1
  selector:
    matchLabels:
      app: postgresql
  template:
    metadata:
      labels:
        app: postgresql
    spec:
      containers:
        - name: postgresql
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: ai_metadata
            - name: POSTGRES_USER
              value: ai_app
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgresql-credentials
                  key: password
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: pgdata
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: pgdata
      spec:
        accessModes: [ReadWriteOnce]
        resources:
          requests:
            storage: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: postgresql
  namespace: ai-data
spec:
  selector:
    app: postgresql
  ports:
    - port: 5432
---
apiVersion: v1
kind: Service
metadata:
  name: postgresql-headless
  namespace: ai-data
spec:
  clusterIP: None
  selector:
    app: postgresql
  ports:
    - port: 5432
