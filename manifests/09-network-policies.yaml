---
# Qdrant — only embedding service, embedder, and rag-service can access
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: qdrant-ingress
  namespace: ai-data
spec:
  podSelector:
    matchLabels:
      app: qdrant
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ai-platform
          podSelector:
            matchLabels:
              app: rag-service
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ai-platform
          podSelector:
            matchLabels:
              app: embedder
      ports:
        - port: 6333
        - port: 6334
---
# PostgreSQL — only langfuse and neo4j namespace can access
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: postgresql-ingress
  namespace: ai-data
spec:
  podSelector:
    matchLabels:
      app: postgresql
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ai-platform
          podSelector:
            matchLabels:
              app: langfuse
      ports:
        - port: 5432
---
# Redis — only rag-service and agent-orchestrator can access
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: redis-ingress
  namespace: ai-data
spec:
  podSelector:
    matchLabels:
      app: redis
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ai-platform
          podSelector:
            matchLabels:
              app: rag-service
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ai-platform
          podSelector:
            matchLabels:
              app: agent-orchestrator
      ports:
        - port: 6379
---
# Neo4j — only graph-updater and agent-orchestrator can access
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: neo4j-ingress
  namespace: ai-data
spec:
  podSelector:
    matchLabels:
      app: neo4j
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ai-platform
          podSelector:
            matchLabels:
              app: graph-updater
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ai-platform
          podSelector:
            matchLabels:
              app: agent-orchestrator
      ports:
        - port: 7474
        - port: 7687
---
# Kafka — all ai-platform services can produce/consume
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: kafka-ingress
  namespace: ai-data
spec:
  podSelector:
    matchLabels:
      app: kafka
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ai-platform
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ai-data
          podSelector:
            matchLabels:
              app: kafka-ui
      ports:
        - port: 9092
        - port: 9093
---
# Embedding service — only rag-service and embedder can call it
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: embedding-ingress
  namespace: ai-platform
spec:
  podSelector:
    matchLabels:
      app: embedding-service
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: rag-service
        - podSelector:
            matchLabels:
              app: embedder
      ports:
        - port: 8080
---
# RAG service — only rag-ui and agent-orchestrator can call it
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: rag-service-ingress
  namespace: ai-platform
spec:
  podSelector:
    matchLabels:
      app: rag-service
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: rag-ui
        - podSelector:
            matchLabels:
              app: agent-orchestrator
      ports:
        - port: 8000
---
# Agent orchestrator — only accessible from outside (port-forward)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: agent-ingress
  namespace: ai-platform
spec:
  podSelector:
    matchLabels:
      app: agent-orchestrator
  policyTypes:
    - Ingress
  ingress:
    - ports:
        - port: 8001
