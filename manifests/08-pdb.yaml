---
# Kafka — must always have at least 1 running (single replica)
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: kafka-pdb
  namespace: ai-data
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: kafka
---
# Qdrant — protect vector data availability
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: qdrant-pdb
  namespace: ai-data
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: qdrant
---
# PostgreSQL — protect database availability
apiVersion: policy/v1
