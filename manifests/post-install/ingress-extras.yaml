---
# Monitoring UIs
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: raj-ai-lab-monitoring-ingress
  namespace: monitoring
  annotations:
    cert-manager.io/cluster-issuer: raj-ai-lab-ca
    nginx.ingress.kubernetes.io/proxy-read-timeout: "30"
    nginx.ingress.kubernetes.io/auth-url: "http://oauth2-proxy.auth.svc.cluster.local:4180/oauth2/auth"
    nginx.ingress.kubernetes.io/auth-signin: "https://auth.raj-ai-lab.localhost:8443/oauth2/start?rd=$scheme://$host$escaped_request_uri"
    nginx.ingress.kubernetes.io/auth-response-headers: "X-Auth-Request-User, X-Auth-Request-Email"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - grafana.raj-ai-lab.localhost
        - prometheus.raj-ai-lab.localhost
      secretName: raj-ai-lab-monitoring-tls
  rules:
    - host: grafana.raj-ai-lab.localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: monitoring-grafana
                port:
                  number: 80
    - host: prometheus.raj-ai-lab.localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: monitoring-kube-prometheus-prometheus
                port:
                  number: 9090
---
# ArgoCD UI
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: raj-ai-lab-argocd-ingress
  namespace: argocd
  annotations:
    cert-manager.io/cluster-issuer: raj-ai-lab-ca
    nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
    nginx.ingress.kubernetes.io/auth-url: "http://oauth2-proxy.auth.svc.cluster.local:4180/oauth2/auth"
    nginx.ingress.kubernetes.io/auth-signin: "https://auth.raj-ai-lab.localhost:8443/oauth2/start?rd=$scheme://$host$escaped_request_uri"
    nginx.ingress.kubernetes.io/auth-response-headers: "X-Auth-Request-User, X-Auth-Request-Email"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - argocd.raj-ai-lab.localhost
      secretName: raj-ai-lab-argocd-tls
  rules:
    - host: argocd.raj-ai-lab.localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: argocd-server
                port:
                  number: 80
