---
# Prometheus — gated behind oauth2-proxy
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: raj-ai-lab-monitoring-ingress
  namespace: monitoring
  annotations:
    cert-manager.io/cluster-issuer: raj-ai-lab-ca
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
    nginx.ingress.kubernetes.io/auth-url: "http://oauth2-proxy.auth.svc.cluster.local:4180/oauth2/auth"
    nginx.ingress.kubernetes.io/auth-signin: "https://auth.raj-ai-lab.localhost:8443/oauth2/start?rd=$scheme://$http_host$escaped_request_uri"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - prometheus.raj-ai-lab.localhost
      secretName: raj-ai-lab-monitoring-tls
  rules:
    - host: prometheus.raj-ai-lab.localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: monitoring-kube-prometheus-prometheus
                port:
                  number: 9090
---
# Grafana — handles its own Keycloak OIDC (no oauth2-proxy)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: raj-ai-lab-grafana-ingress
  namespace: monitoring
  annotations:
    cert-manager.io/cluster-issuer: raj-ai-lab-ca
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - grafana.raj-ai-lab.localhost
      secretName: raj-ai-lab-grafana-tls
  rules:
    - host: grafana.raj-ai-lab.localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: monitoring-grafana
                port:
                  number: 80
---
# ArgoCD — handles its own Keycloak OIDC (no oauth2-proxy)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: raj-ai-lab-argocd-ingress
  namespace: argocd
  annotations:
    cert-manager.io/cluster-issuer: raj-ai-lab-ca
    nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - argocd.raj-ai-lab.localhost
      secretName: raj-ai-lab-argocd-tls
  rules:
    - host: argocd.raj-ai-lab.localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: argocd-server
                port:
                  number: 80
