---
# Bootstrap a self-signed root CA, then chain a CA Issuer off it.
# Two-step pattern: SelfSigned issuer → root CA cert → CA issuer.
# All *.raj-ai-lab.localhost certs will be signed by this internal CA.

apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: selfsigned-bootstrap
spec:
  selfSigned: {}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: raj-ai-lab-root-ca
  namespace: cert-manager
spec:
  isCA: true
  commonName: raj-ai-lab-root-ca
  subject:
    organizations:
      - Raj AI Lab
  duration: 87600h  # 10 years
  secretName: raj-ai-lab-root-ca-secret
  privateKey:
    algorithm: ECDSA
    size: 256
  issuerRef:
    name: selfsigned-bootstrap
    kind: ClusterIssuer
    group: cert-manager.io
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: raj-ai-lab-ca
spec:
  ca:
    secretName: raj-ai-lab-root-ca-secret
