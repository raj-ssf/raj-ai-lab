apiVersion: apps/v1
kind: Deployment
metadata:
  name: keycloak
  namespace: auth
spec:
  replicas: 1
  selector:
    matchLabels:
      app: keycloak
  template:
    metadata:
      labels:
        app: keycloak
    spec:
      initContainers:
        - name: realm-template
          image: python:3.12-slim@sha256:c0f9f8769445b9117692977abd450e79a6313139c8bedbb61c500b687f7b5ddf
          command:
            - python3
            - -c
            - |
              import os
              with open("/template/raj-ai-lab.json") as f:
                  content = f.read()
              content = content.replace("__KEYCLOAK_USER_PASSWORD__", os.environ["KEYCLOAK_USER_PASSWORD"])
              content = content.replace("__OAUTH2_PROXY_CLIENT_SECRET__", os.environ["OAUTH2_PROXY_CLIENT_SECRET"])
              content = content.replace("__MINIO_CLIENT_SECRET__", os.environ["MINIO_CLIENT_SECRET"])
              with open("/output/raj-ai-lab.json", "w") as f:
                  f.write(content)
              print("Realm JSON templated with secrets")
          env:
            - name: KEYCLOAK_USER_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: keycloak-credentials
                  key: user_password
            - name: OAUTH2_PROXY_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: keycloak-client-secrets
                  key: oauth2_proxy_secret
            - name: MINIO_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: keycloak-client-secrets
                  key: minio_secret
          volumeMounts:
            - name: realm-template
              mountPath: /template
              readOnly: true
            - name: realm-import
              mountPath: /output
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      containers:
        - name: keycloak
          image: quay.io/keycloak/keycloak:26.2@sha256:f7fff69c55f8ca7e675803562a681222bbfecbc90fab1eb004df9eb5b655763b
          args:
            - start-dev
            - --import-realm
            - --health-enabled=true
            - --metrics-enabled=true
          env:
            - name: KC_BOOTSTRAP_ADMIN_USERNAME
              value: _bootstrap
            - name: KC_BOOTSTRAP_ADMIN_EXPIRATION
              value: "315360000"
            - name: KC_BOOTSTRAP_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: keycloak-credentials
                  key: admin_password
            - name: KC_PROXY_HEADERS
              value: xforwarded
            - name: KC_HTTP_ENABLED
              value: "true"
            - name: KC_HOSTNAME
              value: "https://keycloak.raj-ai-lab.localhost:8443"
            - name: JAVA_OPTS_KC_HEAP
              value: "-Xms512m -Xmx768m"
          ports:
            - containerPort: 8080
              name: http
          volumeMounts:
            - name: realm-import
              mountPath: /opt/keycloak/data/import
          resources:
            requests:
              cpu: 200m
              memory: 768Mi
            limits:
              cpu: "1"
              memory: 1536Mi
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 9000
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health/live
              port: 9000
            initialDelaySeconds: 60
            periodSeconds: 30
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
        # Sidecar: wait for Keycloak to start, then promote bootstrap admin
        # to permanent by removing is_temporary_admin attribute. Exits after.
        - name: create-admin
          image: python:3.12-slim@sha256:c0f9f8769445b9117692977abd450e79a6313139c8bedbb61c500b687f7b5ddf
          imagePullPolicy: IfNotPresent
          command:
            - python3
            - -uc
            - |
              import urllib.request, urllib.parse, json, time, os
              KC = "http://localhost:8080"
              boot_user = "_bootstrap"
              boot_pw = os.environ["KC_ADMIN_PASS"]
              admin_user = os.environ["KC_ADMIN_USER"]
              admin_pw = os.environ["KC_ADMIN_PASS"]
              print("Waiting for Keycloak...", flush=True)
              for _ in range(60):
                  try:
                      urllib.request.urlopen("http://localhost:9000/health/ready", timeout=2)
                      break
                  except: time.sleep(3)
              else:
                  print("Timeout"); raise SystemExit(0)
              def get_token(u, p):
                  data = urllib.parse.urlencode({"client_id":"admin-cli","username":u,"password":p,"grant_type":"password"}).encode()
                  return json.loads(urllib.request.urlopen(f"{KC}/realms/master/protocol/openid-connect/token", data).read())["access_token"]
              def api(method, path, token, data=None):
                  body = json.dumps(data).encode() if data else None
                  req = urllib.request.Request(f"{KC}{path}", method=method, data=body,
                      headers={"Authorization":f"Bearer {token}","Content-Type":"application/json"})
                  try: return urllib.request.urlopen(req)
                  except urllib.error.HTTPError as e: return e
              # Check if permanent raj admin already exists (from a previous run)
              try:
                  token = get_token(admin_user, admin_pw)
                  print(f"'{admin_user}' already exists and can authenticate — skipping", flush=True)
                  time.sleep(1e9)
              except: pass
              # Login as bootstrap admin
              print("Creating permanent admin...", flush=True)
              token = get_token(boot_user, boot_pw)
              # Get admin role
              role = json.loads(api("GET", "/admin/realms/master/roles/admin", token).read())
              # Create permanent raj user
              resp = api("POST", "/admin/realms/master/users", token, {
                  "username": admin_user, "email": "raj@lab.local",
                  "firstName": "Raj", "lastName": "Sasidharan",
                  "enabled": True, "emailVerified": True,
                  "credentials": [{"type":"password","value":admin_pw,"temporary":False}]
              })
              if resp.status == 201:
                  print(f"Created user '{admin_user}'", flush=True)
              elif resp.status == 409:
                  print(f"User '{admin_user}' already exists", flush=True)
              # Get user ID and assign admin role
              users = json.loads(api("GET", f"/admin/realms/master/users?username={admin_user}&exact=true", token).read())
              uid = users[0]["id"]
              api("POST", f"/admin/realms/master/users/{uid}/role-mappings/realm", token, [{"id":role["id"],"name":"admin"}])
              print(f"Assigned admin role to '{admin_user}'", flush=True)
              # Delete bootstrap user
              boots = json.loads(api("GET", f"/admin/realms/master/users?username={boot_user}&exact=true", token).read())
              if boots:
                  api("DELETE", f"/admin/realms/master/users/{boots[0]['id']}", token)
                  print(f"Deleted bootstrap user '{boot_user}'", flush=True)
              print("Done — permanent admin ready", flush=True)
              time.sleep(1e9)
          env:
            - name: KC_ADMIN_USER
              value: raj
            - name: KC_ADMIN_PASS
              valueFrom:
                secretKeyRef:
                  name: keycloak-credentials
                  key: admin_password
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 32Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      volumes:
        - name: realm-template
          configMap:
            name: keycloak-realm
        - name: realm-import
          emptyDir: {}
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      automountServiceAccountToken: false
