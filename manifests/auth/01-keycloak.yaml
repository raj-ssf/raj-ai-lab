---
apiVersion: v1
kind: Namespace
metadata:
  name: auth
---
# Keycloak realm import — one realm with two OIDC clients and one user.
# Mounted at /opt/keycloak/data/import/ and loaded via --import-realm.
apiVersion: v1
kind: ConfigMap
metadata:
  name: keycloak-realm
  namespace: auth
data:
  raj-ai-lab.json: |
    {
      "realm": "raj-ai-lab",
      "enabled": true,
      "sslRequired": "none",
      "registrationAllowed": false,
      "loginWithEmailAllowed": true,
      "duplicateEmailsAllowed": false,
      "resetPasswordAllowed": false,
      "editUsernameAllowed": false,
      "bruteForceProtected": false,
      "accessTokenLifespan": 43200,
      "ssoSessionIdleTimeout": 43200,
      "users": [
        {
          "username": "raj",
          "email": "raj@lab.local",
          "firstName": "Raj",
          "lastName": "Sasidharan",
          "enabled": true,
          "emailVerified": true,
          "credentials": [
            {
              "type": "password",
              "value": "__KEYCLOAK_USER_PASSWORD__",
              "temporary": false
            }
          ]
        }
      ],
      "clients": [
        {
          "clientId": "oauth2-proxy",
          "enabled": true,
          "clientAuthenticatorType": "client-secret",
          "secret": "__OAUTH2_PROXY_CLIENT_SECRET__",
          "redirectUris": [
            "https://auth.raj-ai-lab.localhost:8443/oauth2/callback"
          ],
          "webOrigins": [
            "https://*.raj-ai-lab.localhost"
          ],
          "standardFlowEnabled": true,
          "directAccessGrantsEnabled": true,
          "publicClient": false,
          "protocol": "openid-connect",
          "defaultClientScopes": ["openid", "email", "profile"]
        },
        {
          "clientId": "minio",
          "enabled": true,
          "clientAuthenticatorType": "client-secret",
          "secret": "__MINIO_CLIENT_SECRET__",
          "redirectUris": [
            "https://minio.raj-ai-lab.localhost:8443/oauth_callback"
          ],
          "webOrigins": [
            "https://minio.raj-ai-lab.localhost"
          ],
          "standardFlowEnabled": true,
          "directAccessGrantsEnabled": true,
          "publicClient": false,
          "protocol": "openid-connect",
          "defaultClientScopes": ["openid", "email", "profile"]
        }
      ]
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: keycloak
  namespace: auth
spec:
  replicas: 1
  selector:
    matchLabels:
      app: keycloak
  template:
    metadata:
      labels:
        app: keycloak
    spec:
      initContainers:
        - name: realm-template
          image: python:3.12-slim
          command:
            - python3
            - -c
            - |
              import os
              with open("/template/raj-ai-lab.json") as f:
                  content = f.read()
              content = content.replace("__KEYCLOAK_USER_PASSWORD__", os.environ["KEYCLOAK_USER_PASSWORD"])
              content = content.replace("__OAUTH2_PROXY_CLIENT_SECRET__", os.environ["OAUTH2_PROXY_CLIENT_SECRET"])
              content = content.replace("__MINIO_CLIENT_SECRET__", os.environ["MINIO_CLIENT_SECRET"])
              with open("/output/raj-ai-lab.json", "w") as f:
                  f.write(content)
              print("Realm JSON templated with secrets")
          env:
            - name: KEYCLOAK_USER_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: keycloak-credentials
                  key: user_password
            - name: OAUTH2_PROXY_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: keycloak-client-secrets
                  key: oauth2_proxy_secret
            - name: MINIO_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: keycloak-client-secrets
                  key: minio_secret
          volumeMounts:
            - name: realm-template
              mountPath: /template
              readOnly: true
            - name: realm-import
              mountPath: /output
      containers:
        - name: keycloak
          image: quay.io/keycloak/keycloak:26.2
          args:
            - start-dev
            - --import-realm
            - --health-enabled=true
            - --metrics-enabled=true
          env:
            - name: KEYCLOAK_ADMIN
              value: raj
            - name: KEYCLOAK_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: keycloak-credentials
                  key: admin_password
            - name: KC_PROXY_HEADERS
              value: xforwarded
            - name: KC_HTTP_ENABLED
              value: "true"
            - name: KC_HOSTNAME
              value: "https://keycloak.raj-ai-lab.localhost:8443"
            - name: JAVA_OPTS_KC_HEAP
              value: "-Xms512m -Xmx768m"
          ports:
            - containerPort: 8080
              name: http
          volumeMounts:
            - name: realm-import
              mountPath: /opt/keycloak/data/import
          resources:
            requests:
              cpu: 200m
              memory: 768Mi
            limits:
              cpu: "1"
              memory: 1536Mi
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 9000
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health/live
              port: 9000
            initialDelaySeconds: 60
            periodSeconds: 30
      volumes:
        - name: realm-template
          configMap:
            name: keycloak-realm
        - name: realm-import
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: keycloak
  namespace: auth
  labels:
    app: keycloak
spec:
  selector:
    app: keycloak
  ports:
    - name: http
      port: 8080
      targetPort: 8080
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: keycloak-ingress
  namespace: auth
  annotations:
    cert-manager.io/cluster-issuer: raj-ai-lab-ca
    nginx.ingress.kubernetes.io/proxy-buffer-size: "128k"
    nginx.ingress.kubernetes.io/proxy-buffers-number: "4"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - keycloak.raj-ai-lab.localhost
      secretName: raj-ai-lab-keycloak-tls
  rules:
    - host: keycloak.raj-ai-lab.localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: keycloak
                port:
                  number: 8080
