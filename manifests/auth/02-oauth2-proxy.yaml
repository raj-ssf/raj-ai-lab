apiVersion: apps/v1
kind: Deployment
metadata:
  name: oauth2-proxy
  namespace: auth
spec:
  replicas: 1
  selector:
    matchLabels:
      app: oauth2-proxy
  template:
    metadata:
      labels:
        app: oauth2-proxy
    spec:
      containers:
        - name: oauth2-proxy
          image: quay.io/oauth2-proxy/oauth2-proxy:v7.6.0@sha256:ae5014b2ad58e04fe95bc6bd37a257ba61a7d3b61a9e6b78e20cfad7e36e8a5e
          args:
            - --config=/etc/oauth2-proxy/oauth2-proxy.cfg
            - --http-address=0.0.0.0:4180
          env:
            - name: OAUTH2_PROXY_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: oauth2-proxy-secrets
                  key: client-secret
            - name: OAUTH2_PROXY_COOKIE_SECRET
              valueFrom:
                secretKeyRef:
                  name: oauth2-proxy-secrets
                  key: cookie-secret
          ports:
            - containerPort: 4180
              name: http
          volumeMounts:
            - name: config
              mountPath: /etc/oauth2-proxy
            - name: ca-cert
              mountPath: /etc/ssl/certs/raj-ai-lab-root-ca.crt
              subPath: tls.crt
              readOnly: true
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /ping
              port: 4180
            initialDelaySeconds: 5
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      volumes:
        - name: config
          configMap:
            name: oauth2-proxy-config
        - name: ca-cert
          secret:
            secretName: raj-ai-lab-root-ca-secret
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      automountServiceAccountToken: false
      initContainers: null
