apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-orchestrator
  namespace: ai-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agent-orchestrator
  template:
    metadata:
      labels:
        app: agent-orchestrator
    spec:
      containers:
        - name: agent
          image: raj/agent-orchestrator:latest
          imagePullPolicy: Never
          env:
            - name: KAFKA_BOOTSTRAP
              value: "kafka-kafka-bootstrap.ai-data:9093"
            - name: KAFKA_SECURITY_PROTOCOL
              value: "SSL"
            - name: KAFKA_CERT_DIR
              value: "/etc/kafka-certs"
            - name: OLLAMA_URL
              value: "http://host.k3d.internal:11434"
            - name: OLLAMA_MODEL
              value: "llama3.2:latest"
            - name: RAG_URL
              value: "http://rag-service.ai-platform:8000"
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: redis-credentials
                  key: url
            - name: MAX_STEPS
              value: "10"
            - name: MAX_TOKENS
              value: "50000"
            - name: NEO4J_URI
              value: "bolt://graphdb.ai-data:7687"
            - name: NEO4J_USER
              value: "neo4j"
            - name: NEO4J_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: neo4j-credentials
                  key: password
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://tempo.monitoring:4317"
            - name: LANGFUSE_PUBLIC_KEY
              valueFrom:
                secretKeyRef:
                  name: langfuse-credentials
                  key: public_key
            - name: LANGFUSE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: langfuse-credentials
                  key: secret_key
            - name: LANGFUSE_HOST
              valueFrom:
                secretKeyRef:
                  name: langfuse-credentials
                  key: host
          ports:
            - containerPort: 8001
          volumeMounts:
            - name: kafka-certs
              mountPath: /etc/kafka-certs
              readOnly: true
            - name: kafka-cluster-ca
              mountPath: /etc/kafka-cluster-ca
              readOnly: true
          readinessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 20
            periodSeconds: 15
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      automountServiceAccountToken: false
      volumes:
        - name: kafka-certs
          secret:
            secretName: agent-orchestrator
        - name: kafka-cluster-ca
          secret:
            secretName: kafka-cluster-ca-cert
---
apiVersion: v1
kind: Service
metadata:
  name: agent-orchestrator
  namespace: ai-platform
  labels:
    app: agent-orchestrator
spec:
  selector:
    app: agent-orchestrator
  ports:
    - name: http
      port: 8001
