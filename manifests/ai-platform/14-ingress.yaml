---
# Install nginx ingress controller
apiVersion: v1
kind: Namespace
metadata:
  name: ingress-nginx
---
# Ingress rules — each UI gets its own subdomain under *.localhost
# All subdomains resolve to 127.0.0.1 on macOS automatically.
# Access via http://<name>.localhost:8080

# --- ai-platform UIs ---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: raj-ai-lab-ingress
  namespace: ai-platform
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "30"
spec:
  ingressClassName: nginx
  rules:
    - host: raj-ai-lab.localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: rag-ui
                port:
                  number: 7860
    - host: api.raj-ai-lab.localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: rag-service
                port:
                  number: 8000
    - host: agent.raj-ai-lab.localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: agent-orchestrator
                port:
                  number: 8001
    - host: langfuse.raj-ai-lab.localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: langfuse
                port:
                  number: 3001
