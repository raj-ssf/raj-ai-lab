apiVersion: apps/v1
kind: Deployment
metadata:
  name: embedder
  namespace: ai-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: embedder
  template:
    metadata:
      labels:
        app: embedder
    spec:
      containers:
        - name: embedder
          image: raj/embedder:latest
          imagePullPolicy: Never
          env:
            - name: KAFKA_BOOTSTRAP
              value: "kafka-kafka-bootstrap.ai-data:9093"
            - name: KAFKA_SECURITY_PROTOCOL
              value: "SSL"
            - name: KAFKA_CERT_DIR
              value: "/etc/kafka-certs"
            - name: EMBEDDING_URL
              value: "http://embedding-service.ai-platform:8080"
            - name: QDRANT_URL
              value: "http://qdrant.ai-data:6333"
            - name: QDRANT_COLLECTION
              value: "raj-docs"
            - name: QDRANT_API_KEY
              valueFrom:
                secretKeyRef:
                  name: qdrant-credentials
                  key: api_key
          volumeMounts:
            - name: kafka-certs
              mountPath: /etc/kafka-certs
              readOnly: true
            - name: kafka-cluster-ca
              mountPath: /etc/kafka-cluster-ca
              readOnly: true
          readinessProbe:
            exec:
              command: ["python3", "-c", "import os; os.getpid()"]
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["python3", "-c", "import os; os.getpid()"]
            initialDelaySeconds: 20
            periodSeconds: 15
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      volumes:
        - name: kafka-certs
          secret:
            secretName: embedder
        - name: kafka-cluster-ca
          secret:
            secretName: kafka-cluster-ca-cert
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      automountServiceAccountToken: false
      initContainers: null
