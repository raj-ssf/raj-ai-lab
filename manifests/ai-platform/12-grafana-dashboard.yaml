apiVersion: v1
kind: ConfigMap
metadata:
  name: ai-metrics-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  ai-metrics.json: |
    {
      "annotations": {"list": []},
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "id": null,
      "links": [],
      "panels": [
        {
          "title": "RAG Query Performance",
          "type": "row",
          "gridPos": {"h": 1, "w": 24, "x": 0, "y": 0},
          "collapsed": false
        },
        {
          "title": "Query Latency (p50 / p95 / p99)",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 8, "x": 0, "y": 1},
          "targets": [
            {"expr": "histogram_quantile(0.50, sum(rate(rag_query_duration_seconds_bucket[5m])) by (le))", "legendFormat": "p50"},
            {"expr": "histogram_quantile(0.95, sum(rate(rag_query_duration_seconds_bucket[5m])) by (le))", "legendFormat": "p95"},
            {"expr": "histogram_quantile(0.99, sum(rate(rag_query_duration_seconds_bucket[5m])) by (le))", "legendFormat": "p99"}
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}, {"color": "yellow", "value": 5}, {"color": "red", "value": 15}]}
            }
          }
        },
        {
          "title": "Queries / min (by model)",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 8, "x": 8, "y": 1},
          "targets": [
            {"expr": "sum(rate(rag_query_total[5m])) by (model) * 60", "legendFormat": "{{model}}"}
          ],
          "fieldConfig": {"defaults": {"unit": "short"}}
        },
        {
          "title": "Cache Hit Rate",
          "type": "gauge",
          "gridPos": {"h": 8, "w": 4, "x": 16, "y": 1},
          "targets": [
            {"expr": "sum(rate(rag_cache_hits_total[5m])) / (sum(rate(rag_cache_hits_total[5m])) + sum(rate(rag_cache_misses_total[5m]))) * 100", "legendFormat": "hit %"}
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "min": 0, "max": 100,
              "thresholds": {"mode": "absolute", "steps": [{"color": "red", "value": null}, {"color": "yellow", "value": 30}, {"color": "green", "value": 60}]}
            }
          }
        },
        {
          "title": "Model Routing Split",
          "type": "piechart",
          "gridPos": {"h": 8, "w": 4, "x": 20, "y": 1},
          "targets": [
            {"expr": "sum by (route) (rag_query_total)", "legendFormat": "{{route}}"}
          ]
        },

        {
          "title": "RAG Internals",
          "type": "row",
          "gridPos": {"h": 1, "w": 24, "x": 0, "y": 9},
          "collapsed": false
        },
        {
          "title": "LLM Latency (by model)",
          "type": "timeseries",
          "gridPos": {"h": 7, "w": 8, "x": 0, "y": 10},
          "targets": [
            {"expr": "histogram_quantile(0.95, sum(rate(rag_llm_duration_seconds_bucket[5m])) by (le, model))", "legendFormat": "{{model}} p95"}
          ],
          "fieldConfig": {"defaults": {"unit": "s"}}
        },
        {
          "title": "Embedding Latency (p95)",
          "type": "timeseries",
          "gridPos": {"h": 7, "w": 8, "x": 8, "y": 10},
          "targets": [
            {"expr": "histogram_quantile(0.95, sum(rate(rag_embedding_duration_seconds_bucket[5m])) by (le))", "legendFormat": "p95"}
          ],
          "fieldConfig": {"defaults": {"unit": "s"}}
        },
        {
          "title": "Vector Search Latency (p95)",
          "type": "timeseries",
          "gridPos": {"h": 7, "w": 4, "x": 16, "y": 10},
          "targets": [
            {"expr": "histogram_quantile(0.95, sum(rate(rag_vector_search_duration_seconds_bucket[5m])) by (le))", "legendFormat": "p95"}
          ],
          "fieldConfig": {"defaults": {"unit": "s"}}
        },
        {
          "title": "LLM Tokens / min",
          "type": "stat",
          "gridPos": {"h": 7, "w": 4, "x": 20, "y": 10},
          "targets": [
            {"expr": "sum(rate(rag_tokens_total[5m])) * 60", "legendFormat": "tokens/min"}
          ]
        },

        {
          "title": "Agent Orchestrator",
          "type": "row",
          "gridPos": {"h": 1, "w": 24, "x": 0, "y": 17},
          "collapsed": false
        },
        {
          "title": "Agent Run Latency (p50 / p95)",
          "type": "timeseries",
          "gridPos": {"h": 7, "w": 8, "x": 0, "y": 18},
          "targets": [
            {"expr": "histogram_quantile(0.50, sum(rate(agent_run_duration_seconds_bucket[5m])) by (le))", "legendFormat": "p50"},
            {"expr": "histogram_quantile(0.95, sum(rate(agent_run_duration_seconds_bucket[5m])) by (le))", "legendFormat": "p95"}
          ],
          "fieldConfig": {"defaults": {"unit": "s"}}
        },
        {
          "title": "Agent Steps Distribution",
          "type": "histogram",
          "gridPos": {"h": 7, "w": 8, "x": 8, "y": 18},
          "targets": [
            {"expr": "sum(rate(agent_steps_count_bucket[5m])) by (le)", "legendFormat": "{{le}}", "format": "heatmap"}
          ]
        },
        {
          "title": "Tool Calls (by tool)",
          "type": "timeseries",
          "gridPos": {"h": 7, "w": 8, "x": 16, "y": 18},
          "targets": [
            {"expr": "sum(rate(agent_tool_calls_total[5m])) by (tool) * 60", "legendFormat": "{{tool}}"}
          ],
          "fieldConfig": {"defaults": {"unit": "short"}}
        },
        {
          "title": "Agent Runs / min (by status)",
          "type": "stat",
          "gridPos": {"h": 4, "w": 8, "x": 0, "y": 25},
          "targets": [
            {"expr": "sum(rate(agent_runs_total[5m])) by (status) * 60", "legendFormat": "{{status}}"}
          ]
        },
        {
          "title": "Active Agents",
          "type": "gauge",
          "gridPos": {"h": 4, "w": 4, "x": 8, "y": 25},
          "targets": [
            {"expr": "agent_active_runs", "legendFormat": "active"}
          ],
          "fieldConfig": {
            "defaults": {
              "min": 0, "max": 10,
              "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}, {"color": "yellow", "value": 5}, {"color": "red", "value": 8}]}
            }
          }
        },
        {
          "title": "Tokens per Run (avg)",
          "type": "stat",
          "gridPos": {"h": 4, "w": 4, "x": 12, "y": 25},
          "targets": [
            {"expr": "histogram_quantile(0.5, sum(rate(agent_tokens_total_bucket[5m])) by (le))", "legendFormat": "median tokens"}
          ]
        },
        {
          "title": "Ingestions / min",
          "type": "stat",
          "gridPos": {"h": 4, "w": 4, "x": 16, "y": 25},
          "targets": [
            {"expr": "sum(rate(rag_ingest_total[5m])) * 60", "legendFormat": "ingests/min"}
          ]
        },
        {
          "title": "Active Queries",
          "type": "gauge",
          "gridPos": {"h": 4, "w": 4, "x": 20, "y": 25},
          "targets": [
            {"expr": "rag_active_queries", "legendFormat": "active"}
          ]
        },

        {
          "title": "Infrastructure Health",
          "type": "row",
          "gridPos": {"h": 1, "w": 24, "x": 0, "y": 29},
          "collapsed": false
        },
        {
          "title": "Pod Restarts",
          "type": "table",
          "gridPos": {"h": 7, "w": 8, "x": 0, "y": 30},
          "targets": [
            {"expr": "kube_pod_container_status_restarts_total{namespace=~\"ai-data|ai-platform\"} > 0", "format": "table", "instant": true}
          ]
        },
        {
          "title": "HPA — RAG Service Replicas",
          "type": "timeseries",
          "gridPos": {"h": 7, "w": 8, "x": 8, "y": 30},
          "targets": [
            {"expr": "kube_horizontalpodautoscaler_status_current_replicas{horizontalpodautoscaler=\"rag-service-hpa\"}", "legendFormat": "current"},
            {"expr": "kube_horizontalpodautoscaler_status_desired_replicas{horizontalpodautoscaler=\"rag-service-hpa\"}", "legendFormat": "desired"},
            {"expr": "kube_horizontalpodautoscaler_spec_max_replicas{horizontalpodautoscaler=\"rag-service-hpa\"}", "legendFormat": "max"}
          ]
        },
        {
          "title": "PVC Disk Usage",
          "type": "timeseries",
          "gridPos": {"h": 7, "w": 8, "x": 16, "y": 30},
          "targets": [
            {"expr": "kubelet_volume_stats_used_bytes{namespace=~\"ai-data\"} / 1024 / 1024", "legendFormat": "{{persistentvolumeclaim}} MB"}
          ],
          "fieldConfig": {"defaults": {"unit": "decmbytes"}}
        },
        {
          "title": "CPU by Service",
          "type": "timeseries",
          "gridPos": {"h": 7, "w": 12, "x": 0, "y": 37},
          "targets": [
            {"expr": "sum(rate(container_cpu_usage_seconds_total{namespace=~\"ai-data|ai-platform\", container!=\"\"}[5m])) by (pod)", "legendFormat": "{{pod}}"}
          ],
          "fieldConfig": {"defaults": {"unit": "short", "custom": {"lineWidth": 1, "fillOpacity": 5}}}
        },
        {
          "title": "Memory by Service",
          "type": "timeseries",
          "gridPos": {"h": 7, "w": 12, "x": 12, "y": 37},
          "targets": [
            {"expr": "sum(container_memory_working_set_bytes{namespace=~\"ai-data|ai-platform\", container!=\"\"}) by (pod) / 1024 / 1024", "legendFormat": "{{pod}} MB"}
          ],
          "fieldConfig": {"defaults": {"unit": "decmbytes", "custom": {"lineWidth": 1, "fillOpacity": 5}}}
        }
      ],
      "schemaVersion": 39,
      "tags": ["ai", "rag", "agent", "pipeline"],
      "templating": {"list": []},
      "time": {"from": "now-1h", "to": "now"},
      "timepicker": {},
      "timezone": "",
      "title": "Raj AI Lab",
      "uid": "raj-ai-metrics",
      "version": 3,
      "weekStart": ""
    }
