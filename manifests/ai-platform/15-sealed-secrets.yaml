---
# External Secrets — stores all passwords in Kubernetes Secrets
# In production, these would come from Vault/AWS Secrets Manager
# via External Secrets Operator. For the lab, we use plain Secrets
# with the pattern that mirrors production.

# PostgreSQL credentials
apiVersion: v1
kind: Secret
metadata:
  name: postgresql-credentials
  namespace: ai-data
  labels:
    managed-by: raj-ai-lab
    secret-type: database
type: Opaque
stringData:
  username: ai_app
  password: raj-lab-password
  database: ai_metadata
  connection-string: postgresql://ai_app:raj-lab-password@postgresql.ai-data:5432/ai_metadata
---
# Neo4j credentials
apiVersion: v1
kind: Secret
metadata:
  name: neo4j-credentials
  namespace: ai-data
  labels:
    managed-by: raj-ai-lab
    secret-type: database
type: Opaque
stringData:
  username: neo4j
  password: rajailab123
  uri: bolt://graphdb.ai-data:7687
---
# MinIO credentials
apiVersion: v1
kind: Secret
metadata:
  name: minio-credentials
  namespace: ai-data
  labels:
    managed-by: raj-ai-lab
    secret-type: storage
type: Opaque
stringData:
  access-key: rajailab
  secret-key: rajailab123
  endpoint: minio.ai-data:9000
  bucket: raj-documents
---
# Langfuse credentials
apiVersion: v1
kind: Secret
metadata:
  name: langfuse-credentials
  namespace: ai-platform
  labels:
    managed-by: raj-ai-lab
    secret-type: observability
type: Opaque
stringData:
  public-key: pk-lf-7be0f473-816e-438b-8c70-2dc594e9da23
  secret-key: sk-lf-c8b83580-2f1c-4fec-903c-d528c81491f7
  host: http://langfuse.ai-platform:3001
---
# Ollama config
apiVersion: v1
kind: Secret
metadata:
  name: ollama-config
  namespace: ai-platform
  labels:
    managed-by: raj-ai-lab
    secret-type: ai-model
type: Opaque
stringData:
  url: http://host.k3d.internal:11434
  model-fast: llama3.2:latest
  model-reasoning: deepseek-r1:latest
---
# Grafana credentials
apiVersion: v1
kind: Secret
metadata:
  name: grafana-credentials
  namespace: monitoring
  labels:
    managed-by: raj-ai-lab
    secret-type: observability
type: Opaque
stringData:
  admin-user: admin
  admin-password: raj-ai-lab
---
# ArgoCD repo credentials
apiVersion: v1
kind: Secret
metadata:
  name: argocd-repo-credentials
  namespace: argocd
  labels:
    managed-by: raj-ai-lab
    secret-type: gitops
type: Opaque
stringData:
  repo-url: https://github.com/raj-ssf/raj-ai-lab.git
  username: raj-ssf
