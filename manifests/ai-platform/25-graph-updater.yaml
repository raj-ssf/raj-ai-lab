apiVersion: apps/v1
kind: Deployment
metadata:
  name: graph-updater
  namespace: ai-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: graph-updater
  template:
    metadata:
      labels:
        app: graph-updater
    spec:
      containers:
        - name: graph-updater
          image: raj/graph-updater:latest
          imagePullPolicy: Never
          env:
            - name: KAFKA_BOOTSTRAP
              value: "kafka-kafka-bootstrap.ai-data:9093"
            - name: KAFKA_SECURITY_PROTOCOL
              value: "SSL"
            - name: KAFKA_CERT_DIR
              value: "/etc/kafka-certs"
            - name: NEO4J_URI
              value: "bolt://graphdb.ai-data:7687"
            - name: NEO4J_USER
              value: "neo4j"
            - name: NEO4J_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: neo4j-credentials
                  key: password
          volumeMounts:
            - name: kafka-certs
              mountPath: /etc/kafka-certs
              readOnly: true
            - name: kafka-cluster-ca
              mountPath: /etc/kafka-cluster-ca
              readOnly: true
          readinessProbe:
            exec:
              command: ["python3", "-c", "import os; os.getpid()"]
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["python3", "-c", "import os; os.getpid()"]
            initialDelaySeconds: 20
            periodSeconds: 15
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      volumes:
        - name: kafka-certs
          secret:
            secretName: graph-updater
        - name: kafka-cluster-ca
          secret:
            secretName: kafka-cluster-ca-cert
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      automountServiceAccountToken: false
      initContainers: null
