apiVersion: apps/v1
kind: Deployment
metadata:
  name: langfuse
  namespace: ai-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: langfuse
  template:
    metadata:
      labels:
        app: langfuse
    spec:
      containers:
        - name: langfuse
          image: langfuse/langfuse:2@sha256:59be0810c76e2b09e5cf17e01eaa1e283ab9af3ede6e5151a9ceaa15465914c6
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: langfuse-app-credentials
                  key: database_url
            - name: NEXTAUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: langfuse-app-credentials
                  key: nextauth_secret
            - name: NEXTAUTH_URL
              value: "http://localhost:3001"
            - name: SALT
              valueFrom:
                secretKeyRef:
                  name: langfuse-app-credentials
                  key: salt
            - name: HOSTNAME
              value: "0.0.0.0"
            # Auto-bootstrap org, project, user, and API keys on first startup
            - name: LANGFUSE_INIT_ORG_ID
              value: "raj-ai-lab"
            - name: LANGFUSE_INIT_ORG_NAME
              value: "Raj AI Lab"
            - name: LANGFUSE_INIT_PROJECT_ID
              value: "raj-ai-lab"
            - name: LANGFUSE_INIT_PROJECT_NAME
              value: "raj-ai-lab"
            - name: LANGFUSE_INIT_PROJECT_PUBLIC_KEY
              valueFrom:
                secretKeyRef:
                  name: langfuse-credentials
                  key: public_key
            - name: LANGFUSE_INIT_PROJECT_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: langfuse-credentials
                  key: secret_key
            - name: LANGFUSE_INIT_USER_EMAIL
              value: "raj@lab.local"
            - name: LANGFUSE_INIT_USER_NAME
              value: "Raj"
            - name: LANGFUSE_INIT_USER_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: langfuse-app-credentials
                  key: user_password
          ports:
            - containerPort: 3000
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 15
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      automountServiceAccountToken: false
      initContainers: null
