apiVersion: apps/v1
kind: Deployment
metadata:
  name: langfuse
  namespace: ai-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: langfuse
  template:
    metadata:
      labels:
        app: langfuse
    spec:
      containers:
        - name: langfuse
          image: langfuse/langfuse:2
          env:
            - name: DATABASE_URL
              value: "postgresql://ai_app:raj-lab-password@postgresql.ai-data:5432/ai_metadata"
            - name: NEXTAUTH_SECRET
              value: "raj-lab-secret-key"
            - name: NEXTAUTH_URL
              value: "http://localhost:3001"
            - name: SALT
              value: "raj-lab-salt"
            - name: HOSTNAME
              value: "0.0.0.0"
            # Auto-bootstrap org, project, user, and API keys on first startup
            - name: LANGFUSE_INIT_ORG_ID
              value: "raj-ai-lab"
            - name: LANGFUSE_INIT_ORG_NAME
              value: "Raj AI Lab"
            - name: LANGFUSE_INIT_PROJECT_ID
              value: "raj-ai-lab"
            - name: LANGFUSE_INIT_PROJECT_NAME
              value: "raj-ai-lab"
            - name: LANGFUSE_INIT_PROJECT_PUBLIC_KEY
              value: "pk-lf-ca45825c-e015-4c7c-b8bc-ed14572ec860"
            - name: LANGFUSE_INIT_PROJECT_SECRET_KEY
              value: "sk-lf-053f2654-f967-4c5d-9612-0405a54c41af"
            - name: LANGFUSE_INIT_USER_EMAIL
              value: "raj@lab.local"
            - name: LANGFUSE_INIT_USER_NAME
              value: "Raj"
            - name: LANGFUSE_INIT_USER_PASSWORD
              value: "rajailab123"
          ports:
            - containerPort: 3000
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 15
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: langfuse
  namespace: ai-platform
spec:
  selector:
    app: langfuse
  ports:
    - port: 3001
      targetPort: 3000
