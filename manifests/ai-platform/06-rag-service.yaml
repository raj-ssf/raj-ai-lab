apiVersion: v1
kind: ConfigMap
metadata:
  name: rag-config
  namespace: ai-platform
data:
  EMBEDDING_URL: "http://embedding-service.ai-platform:8080"
  QDRANT_URL: "http://qdrant.ai-data:6333"
  QDRANT_COLLECTION: "raj-docs"
  OLLAMA_URL: "http://host.k3d.internal:11434"
  OLLAMA_MODEL: "llama3.2:latest"
  TOP_K: "3"
  KAFKA_BOOTSTRAP: "kafka-kafka-bootstrap.ai-data:9093"
  KAFKA_SECURITY_PROTOCOL: "SSL"
  KAFKA_CERT_DIR: "/etc/kafka-certs"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rag-service
  namespace: ai-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rag-service
  template:
    metadata:
      labels:
        app: rag-service
    spec:
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: rag-service
      containers:
        - name: rag
          image: raj/rag-service:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: rag-config
          env:
            - name: LANGFUSE_PUBLIC_KEY
              valueFrom:
                secretKeyRef:
                  name: langfuse-credentials
                  key: public_key
            - name: LANGFUSE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: langfuse-credentials
                  key: secret_key
            - name: LANGFUSE_HOST
              valueFrom:
                secretKeyRef:
                  name: langfuse-credentials
                  key: host
            - name: QDRANT_API_KEY
              valueFrom:
                secretKeyRef:
                  name: qdrant-credentials
                  key: api_key
            - name: MINIO_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: minio-credentials
                  key: access_key
            - name: MINIO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: minio-credentials
                  key: secret_key
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: redis-credentials
                  key: url
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://tempo.monitoring:4317"
          volumeMounts:
            - name: kafka-certs
              mountPath: /etc/kafka-certs
              readOnly: true
            - name: kafka-cluster-ca
              mountPath: /etc/kafka-cluster-ca
              readOnly: true
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 30
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      automountServiceAccountToken: false
      volumes:
        - name: kafka-certs
          secret:
            secretName: rag-service
        - name: kafka-cluster-ca
          secret:
            secretName: kafka-cluster-ca-cert
---
apiVersion: v1
kind: Service
metadata:
  name: rag-service
  namespace: ai-platform
  labels:
    app: rag-service
spec:
  selector:
    app: rag-service
  ports:
    - name: http
      port: 8000
