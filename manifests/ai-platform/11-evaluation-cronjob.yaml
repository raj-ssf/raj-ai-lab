apiVersion: apps/v1
kind: Deployment
metadata:
  name: evaluation
  namespace: ai-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: evaluation
  template:
    metadata:
      labels:
        app: evaluation
    spec:
      nodeSelector:
        kubernetes.io/hostname: k3d-raj-ai-lab-agent-1
      containers:
        - name: evaluation
          image: raj/evaluation:latest
          imagePullPolicy: Never
          command:
            - /bin/bash
            - -c
            - |
              while true; do
                echo "=== Running evaluation ==="
                python3 /app/main.py
                echo "=== Sleeping 6 hours ==="
                sleep 21600
              done
          env:
            - name: RAG_URL
              value: "http://rag-service.ai-platform:8000"
            - name: KAFKA_BOOTSTRAP
              value: "kafka-kafka-bootstrap.ai-data:9093"
            - name: KAFKA_SECURITY_PROTOCOL
              value: "SSL"
            - name: KAFKA_CERT_DIR
              value: "/etc/kafka-certs"
            - name: PG_URL
              valueFrom:
                secretKeyRef:
                  name: postgresql-connection
                  key: connection_string
          volumeMounts:
            - name: kafka-certs
              mountPath: /etc/kafka-certs
              readOnly: true
            - name: kafka-cluster-ca
              mountPath: /etc/kafka-cluster-ca
              readOnly: true
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
      volumes:
        - name: kafka-certs
          secret:
            secretName: evaluation
        - name: kafka-cluster-ca
          secret:
            secretName: kafka-cluster-ca-cert
