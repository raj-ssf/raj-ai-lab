apiVersion: apps/v1
kind: Deployment
metadata:
  name: embedding-service
  namespace: ai-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: embedding-service
  template:
    metadata:
      labels:
        app: embedding-service
      annotations:
        configmap.reloader.stakater.com/reload: "embedding-config"
    spec:
      initContainers:
        - name: model-loader
          image: python:3.12-slim@sha256:c0f9f8769445b9117692977abd450e79a6313139c8bedbb61c500b687f7b5ddf
          command:
            - python3
            - -c
            - |
              import os, sys
              model = os.environ.get("EMBEDDING_MODEL", "sentence-transformers/all-MiniLM-L6-v2")
              cache_dir = os.environ.get("MODEL_CACHE_DIR", "/app/model-cache")
              endpoint = os.environ.get("MINIO_ENDPOINT", "minio.ai-data:9000")
              bucket = os.environ.get("MINIO_MODELS_BUCKET", "models")
              access_key = os.environ["MINIO_ACCESS_KEY"]
              secret_key = os.environ["MINIO_SECRET_KEY"]

              short_name = model.split("/")[-1] if "/" in model else model
              models_dir = os.path.join(cache_dir, "sentence-transformers")
              local_path = os.path.join(models_dir, short_name)
              marker = os.path.join(local_path, "config.json")

              # Clean any other cached models (model swap detected)
              if os.path.exists(models_dir):
                  import shutil
                  for d in os.listdir(models_dir):
                      if d != short_name:
                          stale = os.path.join(models_dir, d)
                          print(f"Removing stale model: {d}")
                          shutil.rmtree(stale, ignore_errors=True)

              if os.path.exists(marker):
                  print(f"Model already cached at {local_path}")
                  sys.exit(0)

              print(f"Downloading {model} from s3://{bucket}/{model}/ ...")
              import subprocess
              subprocess.run([sys.executable, "-m", "pip", "install", "--quiet", "minio"], check=True)
              from minio import Minio
              s3 = Minio(endpoint, access_key=access_key, secret_key=secret_key, secure=False)

              os.makedirs(local_path, exist_ok=True)
              count = 0
              for obj in s3.list_objects(bucket, prefix=f"{model}/", recursive=True):
                  rel = obj.object_name[len(f"{model}/"):]
                  dest = os.path.join(local_path, rel)
                  os.makedirs(os.path.dirname(dest), exist_ok=True)
                  s3.fget_object(bucket, obj.object_name, dest)
                  count += 1
              print(f"Downloaded {count} files to {local_path}")
          envFrom:
            - configMapRef:
                name: embedding-config
          env:
            - name: MINIO_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: minio-credentials
                  key: access_key
            - name: MINIO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: minio-credentials
                  key: secret_key
          volumeMounts:
            - name: model-cache
              mountPath: /app/model-cache
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      containers:
        - name: embedding
          image: raj/embedding-service:latest
          imagePullPolicy: Never
          envFrom:
            - configMapRef:
                name: embedding-config
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 2Gi
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 120
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 180
            periodSeconds: 30
          volumeMounts:
            - name: model-cache
              mountPath: /app/model-cache
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      volumes:
        - name: model-cache
          persistentVolumeClaim:
            claimName: embedding-model-cache
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      automountServiceAccountToken: false
