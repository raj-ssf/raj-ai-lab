---
apiVersion: v1
kind: ConfigMap
metadata:
  name: embedding-config
  namespace: ai-platform
data:
  # Change EMBEDDING_MODEL, restart deployment — initContainer downloads from MinIO.
  # ArgoCD syncs the ConfigMap change, pods restart, new model loaded. No image rebuild.
  #
  # To add a new model:
  #   1. Upload files to MinIO: s3://models/{model-name}/
  #   2. Update EMBEDDING_MODEL here
  #   3. Delete PVC (kubectl delete pvc embedding-model-cache -n ai-platform)
  #   4. ArgoCD syncs → pods restart → initContainer downloads from MinIO → cached on PVC
  EMBEDDING_MODEL: "sentence-transformers/all-mpnet-base-v2"
  MODEL_CACHE_DIR: "/app/model-cache"
  MINIO_ENDPOINT: "minio.ai-data:9000"
  MINIO_MODELS_BUCKET: "models"
  TRANSFORMERS_OFFLINE: "1"
  HF_HUB_OFFLINE: "1"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: embedding-service
  namespace: ai-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: embedding-service
  template:
    metadata:
      labels:
        app: embedding-service
    spec:
      initContainers:
        - name: model-loader
          image: python:3.12-slim
          command:
            - python3
            - -c
            - |
              import os, sys
              model = os.environ.get("EMBEDDING_MODEL", "sentence-transformers/all-MiniLM-L6-v2")
              cache_dir = os.environ.get("MODEL_CACHE_DIR", "/app/model-cache")
              endpoint = os.environ.get("MINIO_ENDPOINT", "minio.ai-data:9000")
              bucket = os.environ.get("MINIO_MODELS_BUCKET", "models")
              access_key = os.environ.get("MINIO_ACCESS_KEY", "rajailab")
              secret_key = os.environ.get("MINIO_SECRET_KEY", "rajailab123")

              short_name = model.split("/")[-1] if "/" in model else model
              models_dir = os.path.join(cache_dir, "sentence-transformers")
              local_path = os.path.join(models_dir, short_name)
              marker = os.path.join(local_path, "config.json")

              # Clean any other cached models (model swap detected)
              if os.path.exists(models_dir):
                  import shutil
                  for d in os.listdir(models_dir):
                      if d != short_name:
                          stale = os.path.join(models_dir, d)
                          print(f"Removing stale model: {d}")
                          shutil.rmtree(stale, ignore_errors=True)

              if os.path.exists(marker):
                  print(f"Model already cached at {local_path}")
                  sys.exit(0)

              print(f"Downloading {model} from s3://{bucket}/{model}/ ...")
              import subprocess
              subprocess.run([sys.executable, "-m", "pip", "install", "--quiet", "minio"], check=True)
              from minio import Minio
              s3 = Minio(endpoint, access_key=access_key, secret_key=secret_key, secure=False)

              os.makedirs(local_path, exist_ok=True)
              count = 0
              for obj in s3.list_objects(bucket, prefix=f"{model}/", recursive=True):
                  rel = obj.object_name[len(f"{model}/"):]
                  dest = os.path.join(local_path, rel)
                  os.makedirs(os.path.dirname(dest), exist_ok=True)
                  s3.fget_object(bucket, obj.object_name, dest)
                  count += 1
              print(f"Downloaded {count} files to {local_path}")
          envFrom:
            - configMapRef:
                name: embedding-config
          env:
            - name: MINIO_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: minio-credentials
                  key: access_key
            - name: MINIO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: minio-credentials
                  key: secret_key
          volumeMounts:
            - name: model-cache
              mountPath: /app/model-cache
      containers:
        - name: embedding
          image: raj/embedding-service:latest
          imagePullPolicy: Never
          envFrom:
            - configMapRef:
                name: embedding-config
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 2Gi
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 120
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 180
            periodSeconds: 30
          volumeMounts:
            - name: model-cache
              mountPath: /app/model-cache
      volumes:
        - name: model-cache
          persistentVolumeClaim:
            claimName: embedding-model-cache
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: embedding-model-cache
  namespace: ai-platform
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 2Gi
---
apiVersion: v1
kind: Service
metadata:
  name: embedding-service
  namespace: ai-platform
spec:
  selector:
    app: embedding-service
  ports:
    - port: 8080
