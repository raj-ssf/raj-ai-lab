---
# Data layer UIs (except MinIO) — gated behind oauth2-proxy
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: raj-ai-lab-data-ingress
  namespace: ai-data
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
    # Gate behind oauth2-proxy
    nginx.ingress.kubernetes.io/auth-url: "http://oauth2-proxy.auth.svc.cluster.local:4180/oauth2/auth"
    nginx.ingress.kubernetes.io/auth-signin: "https://auth.raj-ai-lab.localhost:8443/oauth2/start?rd=$scheme://$http_host$escaped_request_uri"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - kafka.raj-ai-lab.localhost
      secretName: mkcert-wildcard-tls
  rules:
    - host: kafka.raj-ai-lab.localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: kafka-ui
                port:
                  number: 8080
---
# Neo4j — handles its own Keycloak OIDC (no oauth2-proxy)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: raj-ai-lab-neo4j-ingress
  namespace: ai-data
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - neo4j.raj-ai-lab.localhost
        - bolt-neo4j.raj-ai-lab.localhost
      secretName: mkcert-wildcard-tls
  rules:
    - host: neo4j.raj-ai-lab.localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: graphdb
                port:
                  number: 7474
    - host: bolt-neo4j.raj-ai-lab.localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: graphdb
                port:
                  number: 7687
---
# Qdrant dashboard — separate ingress so it can inject the api-key header
# without contaminating other backends. The configuration-snippet annotation is
# managed out-of-band by demo/patch-qdrant-header.sh (reads the api-key from the
# qdrant-credentials Secret and patches the live ingress). ArgoCD's ignoreDifferences
# on this annotation prevents selfHeal from reverting it.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: raj-ai-lab-qdrant-ingress
  namespace: ai-data
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
    # Gate behind oauth2-proxy
    nginx.ingress.kubernetes.io/auth-url: "http://oauth2-proxy.auth.svc.cluster.local:4180/oauth2/auth"
    nginx.ingress.kubernetes.io/auth-signin: "https://auth.raj-ai-lab.localhost:8443/oauth2/start?rd=$scheme://$http_host$escaped_request_uri"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - qdrant.raj-ai-lab.localhost
      secretName: mkcert-wildcard-tls
  rules:
    - host: qdrant.raj-ai-lab.localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: qdrant
                port:
                  number: 6333
---
# MinIO Console — NO oauth2-proxy (has its own login, SPA breaks behind nginx auth gate)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: raj-ai-lab-minio-ingress
  namespace: ai-data
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - minio.raj-ai-lab.localhost
      secretName: mkcert-wildcard-tls
  rules:
    - host: minio.raj-ai-lab.localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: minio
                port:
                  number: 9001
