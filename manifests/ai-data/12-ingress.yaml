---
# Data layer UIs (except MinIO) — gated behind oauth2-proxy
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: raj-ai-lab-data-ingress
  namespace: ai-data
  annotations:
    cert-manager.io/cluster-issuer: raj-ai-lab-ca
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
    # Gate behind oauth2-proxy
    nginx.ingress.kubernetes.io/auth-url: "http://oauth2-proxy.auth.svc.cluster.local:4180/oauth2/auth"
    nginx.ingress.kubernetes.io/auth-signin: "https://auth.raj-ai-lab.localhost:8443/oauth2/start?rd=$scheme://$http_host$escaped_request_uri"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - kafka.raj-ai-lab.localhost
        - qdrant.raj-ai-lab.localhost
        - neo4j.raj-ai-lab.localhost
      secretName: raj-ai-lab-data-tls
  rules:
    - host: kafka.raj-ai-lab.localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: kafka-ui
                port:
                  number: 8080
    - host: qdrant.raj-ai-lab.localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: qdrant
                port:
                  number: 6333
    - host: neo4j.raj-ai-lab.localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: graphdb
                port:
                  number: 7474
---
# MinIO Console — NO oauth2-proxy (has its own login, SPA breaks behind nginx auth gate)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: raj-ai-lab-minio-ingress
  namespace: ai-data
  annotations:
    cert-manager.io/cluster-issuer: raj-ai-lab-ca
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - minio.raj-ai-lab.localhost
      secretName: raj-ai-lab-minio-tls
  rules:
    - host: minio.raj-ai-lab.localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: minio
                port:
                  number: 9001
