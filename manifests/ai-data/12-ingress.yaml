---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: raj-ai-lab-data-ingress
  namespace: ai-data
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "30"
spec:
  ingressClassName: nginx
  rules:
    - host: kafka.raj-ai-lab.localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: kafka-ui
                port:
                  number: 8080
    - host: qdrant.raj-ai-lab.localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: qdrant
                port:
                  number: 6333
    - host: neo4j.raj-ai-lab.localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: graphdb
                port:
                  number: 7474
    - host: minio.raj-ai-lab.localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: minio
                port:
                  number: 9001
