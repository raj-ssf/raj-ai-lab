---
# Default deny ingress only. Egress is unrestricted because:
# 1. Strimzi entity operator needs K8s API for CRD watches
# 2. k3s NetworkPolicy can't match ClusterIP for egress rules
# 3. Data store pods don't initiate external connections anyway
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: ai-data
spec:
  podSelector: {}
  policyTypes:
    - Ingress
