apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: minio
  namespace: ai-data
spec:
  serviceName: minio-headless
  replicas: 1
  selector:
    matchLabels:
      app: minio
  template:
    metadata:
      labels:
        app: minio
    spec:
      containers:
        - name: minio
          # Pinned: this release reliably renders the OIDC SSO button in the
          # embedded console. The 2025-09-07 release has a known issue where
          # the console doesn't pick up identity_openid config for redirectRules.
          image: minio/minio:RELEASE.2025-04-03T14-56-28Z
          args:
            - server
            - /data
            - --console-address
            - ":9001"
          ports:
            - containerPort: 9000
              name: api
            - containerPort: 9001
              name: console
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: minio-credentials
                  key: access_key
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: minio-credentials
                  key: secret_key
            # Public URL so MinIO knows where to redirect after OIDC login
            - name: MINIO_BROWSER_REDIRECT_URL
              value: "https://minio.raj-ai-lab.localhost:8443"
            # Explicitly enable OIDC provider
            - name: MINIO_IDENTITY_OPENID_ENABLE
              value: "on"
            # OIDC (Dex) — users log in via Dex, get mapped to consoleAdmin policy
            # The Service ingress-nginx-8443 exposes nginx ingress port 443 on
            # ClusterIP port 8443, so this URL works from inside the cluster.
            - name: MINIO_IDENTITY_OPENID_CONFIG_URL
              value: "https://dex.raj-ai-lab.localhost:8443/.well-known/openid-configuration"
            - name: MINIO_IDENTITY_OPENID_CLIENT_ID
              value: "minio"
            - name: MINIO_IDENTITY_OPENID_CLIENT_SECRET
              value: "raj-ai-lab-minio-secret"
            - name: MINIO_IDENTITY_OPENID_DISPLAY_NAME
              value: "Sign in with Dex"
            - name: MINIO_IDENTITY_OPENID_REDIRECT_URI
              value: "https://minio.raj-ai-lab.localhost:8443/oauth_callback"
            - name: MINIO_IDENTITY_OPENID_SCOPES
              value: "openid,email,profile"
            # Map all OIDC users to consoleAdmin policy
            - name: MINIO_IDENTITY_OPENID_ROLE_POLICY
              value: "consoleAdmin"
            # Trust the internal CA cert for Dex TLS verification
            - name: SSL_CERT_DIR
              value: "/etc/ssl/certs:/etc/minio-ca"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /minio/health/ready
              port: 9000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /minio/health/live
              port: 9000
            initialDelaySeconds: 20
            periodSeconds: 30
          volumeMounts:
            - name: minio-data
              mountPath: /data
            - name: raj-ai-lab-ca
              mountPath: /etc/minio-ca
              readOnly: true
      hostAliases:
        # Resolve dex.raj-ai-lab.localhost to the ingress-nginx-8443 Service
        # which exposes nginx ingress port 443 on ClusterIP port 8443. This
        # lets MinIO use the public URL with port 8443 from inside the cluster.
        - ip: "10.43.181.166"
          hostnames:
            - dex.raj-ai-lab.localhost
      volumes:
        - name: raj-ai-lab-ca
          secret:
            secretName: raj-ai-lab-root-ca-secret
  volumeClaimTemplates:
    - metadata:
        name: minio-data
      spec:
        accessModes: [ReadWriteOnce]
        resources:
          requests:
            storage: 5Gi
---
apiVersion: v1
kind: Service
metadata:
  name: minio
  namespace: ai-data
spec:
  selector:
    app: minio
  ports:
    - name: api
      port: 9000
    - name: console
      port: 9001
---
apiVersion: v1
kind: Service
metadata:
  name: minio-headless
  namespace: ai-data
spec:
  clusterIP: None
  selector:
    app: minio
  ports:
    - name: api
      port: 9000
    - name: console
      port: 9001
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: minio-pdb
  namespace: ai-data
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: minio
