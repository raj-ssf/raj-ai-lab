---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: ai-data-quota
  namespace: ai-data
spec:
  hard:
    requests.cpu: "6"
    requests.memory: 12Gi
    limits.cpu: "12"
    limits.memory: 20Gi
    pods: "15"
    persistentvolumeclaims: "10"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: ai-data-defaults
  namespace: ai-data
spec:
  limits:
    - type: Container
      default:
        cpu: 500m
        memory: 512Mi
      defaultRequest:
        cpu: 100m
        memory: 256Mi
