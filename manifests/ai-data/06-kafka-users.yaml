---
# KafkaUser CRs — Strimzi User Operator generates a Secret for each
# containing user.crt + user.key + ca.crt. Authentication via mTLS.
#
# Secrets are auto-mirrored to ai-platform via emberstack/reflector
# (annotations on the generated secret tell reflector to mirror).
#
# Stage 2: TLS auth only. Stage 3 will add per-user ACLs.

apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaUser
metadata:
  name: rag-service
  namespace: ai-data
  labels:
    strimzi.io/cluster: kafka
spec:
  authentication:
    type: tls
  template:
    secret:
      metadata:
        annotations:
          reflector.v1.k8s.emberstack.com/reflection-allowed: "true"
          reflector.v1.k8s.emberstack.com/reflection-allowed-namespaces: "ai-platform"
          reflector.v1.k8s.emberstack.com/reflection-auto-enabled: "true"
          reflector.v1.k8s.emberstack.com/reflection-auto-namespaces: "ai-platform"
---
