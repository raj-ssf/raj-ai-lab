---
# KafkaUser CRs with mTLS auth + per-user ACLs (Stage 3)
# Default deny — explicit allow only on the topics each service needs.
#
# Strimzi User Operator generates Secrets with cert/key/CA, mirrored
# to ai-platform via emberstack/reflector annotations.

# rag-service: produces document.uploaded + query.log
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaUser
metadata:
  name: rag-service
  namespace: ai-data
  labels:
    strimzi.io/cluster: kafka
spec:
  authentication:
    type: tls
  authorization:
    type: simple
    acls:
      - resource:
          type: topic
          name: document.uploaded
          patternType: literal
        operations: [Write, Describe]
      - resource:
          type: topic
          name: query.log
          patternType: literal
        operations: [Write, Describe]
  template:
    secret:
      metadata:
        annotations:
          reflector.v1.k8s.emberstack.com/reflection-allowed: "true"
          reflector.v1.k8s.emberstack.com/reflection-allowed-namespaces: "ai-platform"
          reflector.v1.k8s.emberstack.com/reflection-auto-enabled: "true"
          reflector.v1.k8s.emberstack.com/reflection-auto-namespaces: "ai-platform"
---
