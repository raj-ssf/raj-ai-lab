---
# normalizer: consumes document.uploaded → produces document.canonical (+dlt)
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaUser
metadata:
  name: normalizer
  namespace: ai-data
  labels:
    strimzi.io/cluster: kafka
spec:
  authentication:
    type: tls
  authorization:
    type: simple
    acls:
      - resource:
          type: topic
          name: document.uploaded
          patternType: literal
        operations: [Read, Describe]
      - resource:
          type: topic
          name: document.canonical
          patternType: literal
        operations: [Write, Describe]
      - resource:
          type: topic
          name: document.canonical-dlt
          patternType: literal
        operations: [Write, Describe]
      - resource:
          type: group
          name: normalizer-group
          patternType: literal
        operations: [Read, Describe]
  template:
    secret:
      metadata:
        annotations:
          reflector.v1.k8s.emberstack.com/reflection-allowed: "true"
          reflector.v1.k8s.emberstack.com/reflection-allowed-namespaces: "ai-platform"
          reflector.v1.k8s.emberstack.com/reflection-auto-enabled: "true"
          reflector.v1.k8s.emberstack.com/reflection-auto-namespaces: "ai-platform"
