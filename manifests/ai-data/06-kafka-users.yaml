---
# kafka-ui-admin: read-only on ALL topics + groups for inspection
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaUser
metadata:
  name: kafka-ui-admin
  namespace: ai-data
  labels:
    strimzi.io/cluster: kafka
spec:
  authentication:
    type: tls
  authorization:
    type: simple
    acls:
      - resource:
          type: topic
          name: "*"
          patternType: literal
        operations: [Read, Describe, DescribeConfigs]
      - resource:
          type: group
          name: "*"
          patternType: literal
        operations: [Read, Describe]
      - resource:
          type: cluster
        operations: [Describe, DescribeConfigs]
