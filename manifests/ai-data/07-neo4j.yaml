apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: neo4j
  namespace: ai-data
spec:
  serviceName: graphdb-headless
  replicas: 1
  selector:
    matchLabels:
      app: neo4j
  template:
    metadata:
      labels:
        app: neo4j
    spec:
      containers:
        - name: neo4j
          image: neo4j:5.26-enterprise
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 7474
              name: http
            - containerPort: 7687
              name: bolt
          env:
            - name: NEO4J_ACCEPT_LICENSE_AGREEMENT
              value: "yes"
            - name: NEO4J_AUTH
              valueFrom:
                secretKeyRef:
                  name: neo4j-credentials
                  key: auth
            - name: NEO4J_PLUGINS
              value: '["apoc"]'
            - name: NEO4J_server_default__listen__address
              value: "0.0.0.0"
            # OIDC SSO via Keycloak
            - name: NEO4J_dbms_security_authentication__providers
              value: "oidc-keycloak,native"
            - name: NEO4J_dbms_security_authorization__providers
              value: "oidc-keycloak,native"
            - name: NEO4J_dbms_security_oidc_keycloak_display__name
              value: "Keycloak"
            - name: NEO4J_dbms_security_oidc_keycloak_auth__flow
              value: "pkce"
            - name: NEO4J_dbms_security_oidc_keycloak_well__known__discovery__uri
              value: "https://keycloak.raj-ai-lab.localhost:8443/realms/raj-ai-lab/.well-known/openid-configuration"
            - name: NEO4J_dbms_security_oidc_keycloak_params
              value: "client_id=neo4j;response_type=code;scope=openid email profile"
            - name: NEO4J_dbms_security_oidc_keycloak_token__endpoint__params
              value: "client_id=neo4j;client_secret=raj-ai-lab-neo4j-secret"
            - name: NEO4J_dbms_security_oidc_keycloak_config
              value: "principal=preferred_username;code_challenge_method=S256"
            - name: NEO4J_dbms_security_oidc_keycloak_audience
              value: "neo4j"
            - name: NEO4J_dbms_security_oidc_keycloak_claims_username
              value: "preferred_username"
            - name: NEO4J_dbms_security_oidc_keycloak_claims_groups
              value: "groups"
            - name: NEO4J_dbms_security_oidc_keycloak_authorization_group__to__role__mapping
              value: "admin=admin"
            # Trust self-signed CA
            - name: NEO4J_dbms_security_oidc_keycloak_get__groups__from__user__info
              value: "true"
            # JVM truststore with self-signed CA for Keycloak OIDC
            - name: NEO4J_server_jvm_additional
              value: "-Djavax.net.ssl.trustStore=/truststore/cacerts -Djavax.net.ssl.trustStorePassword=changeit"
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /
              port: 7474
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 7474
            initialDelaySeconds: 60
            periodSeconds: 30
          volumeMounts:
            - name: neo4j-data
              mountPath: /data
            - name: ca-cert
              mountPath: /certificates/ca
              readOnly: true
            - name: truststore
              mountPath: /truststore
              readOnly: true
      hostAliases:
        - ip: "10.43.181.166"
          hostnames:
            - keycloak.raj-ai-lab.localhost
      initContainers:
        # Import self-signed CA into JVM truststore so Neo4j can validate Keycloak OIDC tokens
        - name: import-ca
          image: neo4j:5.26-enterprise
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              cp /opt/java/openjdk/lib/security/cacerts /cacerts-out/cacerts
              chmod 644 /cacerts-out/cacerts
              keytool -importcert -noprompt -trustcacerts \
                -alias raj-ai-lab-ca \
                -file /certificates/ca/tls.crt \
                -keystore /cacerts-out/cacerts \
                -storepass changeit
              echo "CA imported into JVM truststore"
          volumeMounts:
            - name: ca-cert
              mountPath: /certificates/ca
              readOnly: true
            - name: truststore
              mountPath: /cacerts-out
      volumes:
        - name: ca-cert
          secret:
            secretName: mkcert-ca
        - name: truststore
          emptyDir: {}
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      automountServiceAccountToken: false
  volumeClaimTemplates:
    - metadata:
        name: neo4j-data
      spec:
        accessModes: [ReadWriteOnce]
        resources:
          requests:
            storage: 2Gi
---
apiVersion: v1
kind: Service
metadata:
  name: graphdb
  namespace: ai-data
spec:
  selector:
    app: neo4j
  ports:
    - name: http
      port: 7474
    - name: bolt
      port: 7687
---
apiVersion: v1
kind: Service
metadata:
  name: graphdb-headless
  namespace: ai-data
spec:
  clusterIP: None
  selector:
    app: neo4j
  ports:
    - name: http
      port: 7474
    - name: bolt
      port: 7687
