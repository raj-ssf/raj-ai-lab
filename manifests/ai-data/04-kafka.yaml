---
# Strimzi-managed Kafka cluster (KRaft mode, no ZooKeeper)
# Stage 1: PLAINTEXT listener for backward compatibility with existing services
# Stage 2 will add TLS + SASL listeners
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaNodePool
metadata:
  name: dual-role
  namespace: ai-data
  labels:
    strimzi.io/cluster: kafka
spec:
  replicas: 1
  roles:
    - controller
    - broker
  storage:
    type: jbod
    volumes:
      - id: 0
        type: persistent-claim
        size: 2Gi
        deleteClaim: false
        kraftMetadata: shared
  resources:
    requests:
      cpu: 200m
      memory: 1Gi
    limits:
      cpu: "1"
      memory: 2Gi
---
apiVersion: kafka.strimzi.io/v1beta2
kind: Kafka
metadata:
  name: kafka
  namespace: ai-data
  annotations:
    strimzi.io/node-pools: enabled
    strimzi.io/kraft: enabled
spec:
  kafka:
    version: 4.1.0
    metadataVersion: 4.1-IV1
    listeners:
      - name: plain
        port: 9092
        type: internal
        tls: false
    config:
      offsets.topic.replication.factor: 1
      transaction.state.log.replication.factor: 1
      transaction.state.log.min.isr: 1
      default.replication.factor: 1
      min.insync.replicas: 1
      auto.create.topics.enable: "true"
  entityOperator:
    topicOperator: {}
    userOperator: {}
---
# Backward-compatible Service alias — keeps "kafka.ai-data:9092" working
# Strimzi creates kafka-kafka-bootstrap.ai-data:9092 by default; this alias
# maps existing consumer connection strings to the new bootstrap service.
apiVersion: v1
kind: Service
metadata:
  name: kafka
  namespace: ai-data
  labels:
    app: kafka
spec:
  type: ExternalName
  externalName: kafka-kafka-bootstrap.ai-data.svc.cluster.local
  ports:
    - name: client
      port: 9092
